<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B5B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tiny Fixers" />
    <meta name="description" content="A cozy mobile puzzle game - help quirky characters fix tiny problems!" />
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Tiny Fixers</title>
    <style>
      :root {
        --color-cream: #FDF8F3;
        --color-warm-white: #FEF9F3;
        --color-soft-peach: #FFE8D6;
        --color-coral: #FF6B5B;
        --color-coral-dark: #E85A4A;
        --color-sage: #7CB69D;
        --color-sage-dark: #5A9A7C;
        --color-sky: #6BAED6;
        --color-sky-dark: #4A8FC4;
        --color-mustard: #F4B942;
        --color-mustard-dark: #D9A23A;
        --color-lavender: #9B8EC4;
        --color-lavender-dark: #7B6EA4;
        --color-charcoal: #3D3D3D;
        --color-graphite: #5A5A5A;
        --color-soft-gray: #9A9A9A;
        
        --font-display: 'Fredoka', sans-serif;
        --font-body: 'Nunito', sans-serif;
        
        --shadow-soft: 0 2px 8px rgba(61, 61, 61, 0.08);
        --shadow-medium: 0 4px 16px rgba(61, 61, 61, 0.12);
        --shadow-lifted: 0 8px 24px rgba(61, 61, 61, 0.16);
        --shadow-button: 0 4px 0 rgba(0, 0, 0, 0.1);
        
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 24px;
        --radius-full: 9999px;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, var(--color-cream) 0%, var(--color-soft-peach) 100%);
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      #game-container {
        width: 100%;
        height: 100%;
      }
      
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, var(--color-cream) 0%, var(--color-soft-peach) 100%);
        z-index: 1000;
        overflow: hidden;
      }
      
      .loading-screen::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
      }
      
      .loading-logo {
        position: relative;
        margin-bottom: 2rem;
      }
      
      .loading-logo h1 {
        font-family: var(--font-display);
        font-size: 3rem;
        font-weight: 700;
        color: var(--color-coral);
        text-shadow: 0 3px 0 var(--color-coral-dark), 0 6px 12px rgba(255, 107, 91, 0.3);
        letter-spacing: -0.02em;
      }
      
      .loading-logo .subtitle {
        font-family: var(--font-body);
        font-size: 1rem;
        font-weight: 500;
        color: var(--color-graphite);
        margin-top: 0.5rem;
        text-align: center;
        opacity: 0.8;
      }
      
      .loading-bar-container {
        width: 240px;
        height: 12px;
        background: var(--color-warm-white);
        border-radius: var(--radius-full);
        overflow: hidden;
        box-shadow: inset 0 2px 4px rgba(61, 61, 61, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.8);
      }
      
      .loading-progress {
        height: 100%;
        background: linear-gradient(90deg, var(--color-coral) 0%, var(--color-mustard) 100%);
        border-radius: var(--radius-full);
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        width: 0%;
        box-shadow: 0 2px 8px rgba(255, 107, 91, 0.4);
      }
      
      .loading-text {
        margin-top: 1rem;
        font-family: var(--font-body);
        font-size: 0.875rem;
        color: var(--color-soft-gray);
        font-weight: 500;
      }
      
      .loading-decorations {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }
      
      .decoration {
        position: absolute;
        opacity: 0.15;
        animation: float 6s ease-in-out infinite;
      }
      
      .decoration:nth-child(1) {
        top: 15%;
        left: 10%;
        font-size: 2rem;
        animation-delay: 0s;
      }
      
      .decoration:nth-child(2) {
        top: 25%;
        right: 15%;
        font-size: 1.5rem;
        animation-delay: 1s;
      }
      
      .decoration:nth-child(3) {
        bottom: 30%;
        left: 15%;
        font-size: 1.75rem;
        animation-delay: 2s;
      }
      
      .decoration:nth-child(4) {
        bottom: 20%;
        right: 10%;
        font-size: 2.25rem;
        animation-delay: 0.5s;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(5deg); }
      }
      
      .loading-dots {
        display: flex;
        gap: 6px;
        margin-top: 1.5rem;
      }
      
      .loading-dots span {
        width: 8px;
        height: 8px;
        background: var(--color-coral);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }
      
      .loading-dots span:nth-child(1) { animation-delay: 0s; }
      .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
      
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
        40% { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="loading-screen" id="loading">
        <div class="loading-decorations">
          <span class="decoration">🔧</span>
          <span class="decoration">✨</span>
          <span class="decoration">🌸</span>
          <span class="decoration">🏠</span>
        </div>
        <div class="loading-logo">
          <h1>Tiny Fixers</h1>
          <p class="subtitle">Help fix tiny problems!</p>
        </div>
        <div class="loading-bar-container">
          <div class="loading-progress" id="loading-progress"></div>
        </div>
        <p class="loading-text" id="loading-text">Getting things ready...</p>
        <div class="loading-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
